<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Entrar — DPO PJ Protection</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-card card">
    <div class="center" style="margin-bottom:18px">
      <div class="brand" style="font-size:22px">DPO PJ <span class="g">Protection</span></div>
      <p class="muted small" style="margin-top:6px">Acesso à plataforma de conformidade LGPD.</p>
    </div>

    <!-- Etapa 1: credenciais -->
    <div id="step-cred">
      <div class="field"><label>E-mail</label><input id="email" type="email" autocomplete="username" placeholder="voce@empresa.com.br"></div>
      <div class="field"><label>Senha</label><input id="password" type="password" autocomplete="current-password" placeholder="Sua senha"></div>
      <button class="btn gold block" id="btnLogin">Entrar</button>
    </div>

    <!-- Etapa 2: código MFA (autenticador) -->
    <div id="step-mfa" class="hide">
      <p class="small muted center" style="margin-bottom:12px">Verificação em duas etapas. Informe o código de 6 dígitos do seu app autenticador.</p>
      <div class="field"><label>Código do autenticador</label><input id="mfaCode" inputmode="numeric" maxlength="6" autocomplete="one-time-code" placeholder="000000" style="letter-spacing:6px;text-align:center;font-size:20px"></div>
      <button class="btn gold block" id="btnMfa">Confirmar e entrar</button>
      <button class="btn ghost block" id="btnMfaBack" style="margin-top:8px">Voltar</button>
    </div>

    <p id="err" class="small center hide" style="color:#ff9aa8;margin-top:12px"></p>

    <hr style="border:none;border-top:1px solid var(--line);margin:18px 0">
    <p class="small center muted">
      Recebeu um link de ativação? <a href="/ativar">Ative seu acesso</a><br>
      Quer contratar? <a href="/checkout.html">Ver módulos e planos</a>
    </p>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>
(function () {
  "use strict";
  const $ = (s) => document.querySelector(s);
  const params = new URLSearchParams(location.search);
  const next = params.get("next");

  // Já logado? Redireciona.
  const t = localStorage.getItem("dpo_token");
  const u = JSON.parse(localStorage.getItem("dpo_user") || "null");
  if (t && u) routeFor(u);

  function routeFor(user) {
    if (user.role === "OWNER") location.replace("/painel");
    else if (!user.tenant_id) location.replace("/ativar");
    else location.replace("/app/");
  }

  function showErr(m) { const e = $("#err"); e.textContent = m; e.classList.remove("hide"); }
  function clearErr() { $("#err").classList.add("hide"); }

  let mfaToken = null; // desafio curto entre senha e código

  function finish(data) {
    localStorage.setItem("dpo_token", data.token);
    localStorage.setItem("dpo_user", JSON.stringify(data.user));
    if (next) location.replace(next); else routeFor(data.user);
  }

  function showMfaStep() {
    $("#step-cred").classList.add("hide");
    $("#step-mfa").classList.remove("hide");
    clearErr();
    setTimeout(() => $("#mfaCode").focus(), 50);
  }
  function showCredStep() {
    mfaToken = null;
    $("#step-mfa").classList.add("hide");
    $("#step-cred").classList.remove("hide");
    clearErr();
  }

  async function login() {
    const btn = $("#btnLogin"); btn.disabled = true; btn.textContent = "Entrando…";
    clearErr();
    try {
      const res = await fetch("/api/auth/login", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: $("#email").value.trim(), password: $("#password").value }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data.ok === false) throw new Error(data.error || "Falha no login.");
      if (data.mfaRequired) { mfaToken = data.mfaToken; showMfaStep(); return; }
      finish(data);
    } catch (e) { showErr(e.message); }
    finally { btn.disabled = false; btn.textContent = "Entrar"; }
  }

  async function verifyMfa() {
    const btn = $("#btnMfa"); btn.disabled = true; btn.textContent = "Confirmando…";
    clearErr();
    try {
      const code = ($("#mfaCode").value || "").replace(/\D/g, "");
      if (code.length !== 6) throw new Error("Informe os 6 dígitos do app.");
      const res = await fetch("/api/auth/mfa-verify", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ mfaToken, code }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data.ok === false) throw new Error(data.error || "Código inválido.");
      finish(data);
    } catch (e) { showErr(e.message); }
    finally { btn.disabled = false; btn.textContent = "Confirmar e entrar"; }
  }

  $("#btnLogin").addEventListener("click", login);
  $("#btnMfa").addEventListener("click", verifyMfa);
  $("#btnMfaBack").addEventListener("click", showCredStep);
  ["email", "password"].forEach((id) => $("#" + id).addEventListener("keydown", (e) => { if (e.key === "Enter") login(); }));
  $("#mfaCode").addEventListener("keydown", (e) => { if (e.key === "Enter") verifyMfa(); });
})();
</script>
</body>
</html>
